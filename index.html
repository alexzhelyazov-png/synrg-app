<!DOCTYPE html>
<html lang="bg">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#A4A3C5"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="SYNRG"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <link rel="icon" type="image/png" href="icon-192.png"/>
  <title>SYNRG App</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&family=Space+Grotesk:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;width:100%;background:#1A1918;color:#F4F4F3;font-family:'DM Sans',sans-serif}
    #root{height:100%}
    #landing{position:fixed;inset:0;background:#1A1918;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;gap:0;z-index:100;}
    .land-sub{color:#9A9693;font-size:15px;margin-bottom:48px;text-align:center}
    .install-card{width:100%;max-width:360px;background:#1E1C1B;border:1px solid #2E2B2A;border-radius:20px;padding:28px 24px;margin-bottom:16px;}
    .install-card h2{font-size:18px;font-weight:800;margin-bottom:6px}
    .install-card p{color:#9A9693;font-size:13px;line-height:1.6;margin-bottom:20px}
    .btn-install{width:100%;padding:16px;border-radius:12px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:16px;font-weight:800;background:#C4E9BF;color:#1A1918;transition:opacity .2s;}
    .btn-install:hover{opacity:.85}
    .btn-skip{background:transparent;border:none;color:#9A9693;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;padding:12px;text-decoration:underline;}
    .btn-skip:hover{color:#F4F4F3}
    .ios-hint{display:none;background:rgba(196,233,191,0.1);border:1px solid rgba(196,233,191,0.2);border-radius:12px;padding:14px 16px;margin-top:12px;font-size:13px;color:#C4E9BF;line-height:1.6;text-align:center;}
  </style>
</head>
<body>
<div id="landing">

  <div class="land-sub" style="margin-top:12px">beyond fitness</div>
  <div class="install-card" id="install-card">
    <h2 id="card-title">Инсталирай приложението</h2>
    <p id="card-desc">Добави SYNRG към началния екран на телефона си и го ползвай като истинско приложение — без браузър, без реклами.</p>
    <button class="btn-install" id="install-btn">📲 Добави към началния екран</button>
    <div class="ios-hint" id="ios-hint">Натисни <strong>Share ⬆️</strong> в Safari<br>след това <strong>"Add to Home Screen"</strong></div>
  </div>
  <button class="btn-skip" id="skip-btn">Продължи без инсталиране →</button>
</div>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="app-compiled.js"></script>
<script>
  const isStandalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;
  if (isStandalone) { document.getElementById('landing').style.display='none'; launchApp(); }
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; });
  if (isIOS && !isStandalone) {
    document.getElementById('install-btn').style.display='none';
    document.getElementById('ios-hint').style.display='block';
    document.getElementById('card-title').textContent='Инсталирай на iPhone';
  }
  document.getElementById('install-btn').addEventListener('click', async () => {
    if (deferredPrompt) { deferredPrompt.prompt(); const {outcome} = await deferredPrompt.userChoice; deferredPrompt=null; if(outcome==='accepted'){skipToApp();return;} }
    skipToApp();
  });
  document.getElementById('skip-btn').addEventListener('click', skipToApp);
  function skipToApp() {
    const l=document.getElementById('landing');
    l.style.transition='opacity .3s'; l.style.opacity='0';
    setTimeout(()=>{l.style.display='none';launchApp();},300);
  }
  function launchApp() {
    try { const root=ReactDOM.createRoot(document.getElementById('root')); root.render(React.createElement(App)); }
    catch(e) { document.body.innerHTML='<div style="color:red;padding:20px">Error: '+e.message+'</div>'; }
  }
  if('serviceWorker' in navigator){
    window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
  }
</script>
</body>
</html>
